<nav class="navbar">
    <div class="nav-container">
        <a routerLink="/inicio" class="nav-logo">
            <img src="assets/images/Logo_ClinicaAleli_-Blanco.png" alt="Logo Clínica Alelí" class="nav-logo-img">
        </a>

        <ul class="nav-menu">
            <li><a routerLink="/inicio" routerLinkActive="active">INICIO</a></li>
            <li><a routerLink="/servicios" routerLinkActive="active">SERVICIOS</a></li>
            <li><a routerLink="/especialidades" routerLinkActive="active">ESPECIALIDADES</a></li>
            <li><a routerLink="/nosotros" routerLinkActive="active">NOSOTROS</a></li>
            <li><a routerLink="/instalaciones" routerLinkActive="active">INSTALACIONES</a></li>
            <li><a routerLink="/contacto" routerLinkActive="active">CONTACTO</a></li>
            <li><a routerLink="/resultados" routerLinkActive="active">RESULTADOS</a></li>
            <li><a routerLink="/blog" routerLinkActive="active">BLOG</a></li>
        </ul>

        <div class="nav-actions">
            <!-- If not logged in -->
            <a *ngIf="!currentUser()" routerLink="/auth" class="user-icon-btn" title="Iniciar Sesión">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6.02-3.22.03-1.99 4.02-3.08 6.02-3.08 1.99 0 5.99 1.09 6.02 3.08-1.31 1.94-3.52 3.22-6.02 3.22z" />
                </svg>
            </a>

            <!-- If logged in -->
            <div *ngIf="currentUser()" class="user-profile-wrapper">
                <div class="user-profile-trigger" (click)="toggleProfileMenu($event)">
                    <div class="user-initials">{{currentUser()?.nombre?.charAt(0)}}</div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="chevron-icon" [class.rotated]="isProfileMenuOpen()">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>

                <!-- Dropdown -->
                <div class="profile-dropdown" *ngIf="isProfileMenuOpen()" (click)="$event.stopPropagation()">
                    <div class="dropdown-header">
                        <span class="user-name">{{currentUser()?.nombre}}</span>
                        <span class="user-role">{{currentUser()?.tipo === 'ADMIN' ? 'Administrador' :
                            'Paciente'}}</span>
                    </div>
                    <div class="dropdown-content">
                        <a *ngIf="currentUser()?.tipo === 'ADMIN'" routerLink="/admin"
                            (click)="isProfileMenuOpen.set(false)" class="dropdown-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect>
                            </svg>
                            Panel de Control
                        </a>
                        <a routerLink="/perfil" (click)="isProfileMenuOpen.set(false)" class="dropdown-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Mi Perfil
                        </a>
                        <div class="dropdown-divider"></div>
                        <button (click)="logout()" class="dropdown-item logout">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                            Cerrar Sesión
                        </button>
                    </div>
                </div>
            </div>

            <button class="cta-button nav-cta">AGENDAR CITA</button>
        </div>
    </div>
</nav>
<!-- Overlay to close menu when clicking outside -->
<div class="menu-overlay" *ngIf="isProfileMenuOpen()" (click)="toggleProfileMenu()"></div>
