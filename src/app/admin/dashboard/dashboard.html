<div class="dashboard-container">
    <header class="section-header">
        <h1>Dashboard Administrativo</h1>
        <p>Resumen general del estado de la plataforma Clínica Alelí.</p>
    </header>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-icon blue">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </div>
            <div class="metric-data">
                <span class="value">0</span>
                <span class="label">Visitas Mensuales</span>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-icon green">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </div>
            <div class="metric-data">
                <span class="value">0</span>
                <span class="label">Páginas Configuradas</span>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-icon orange">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <div class="metric-data">
                <span class="value">--</span>
                <span class="label">Estado del Sitio</span>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="dashboard-card main-card">
            <div class="card-header">
                <h3>Acciones Rápidas</h3>
            </div>
            <div class="quick-actions">
                <button class="action-btn" [routerLink]="['/admin/paginas', 'inicio']">
                    <span>Editar Inicio</span>
                </button>
                <button class="action-btn" [routerLink]="['/admin/paginas', 'especialidades']">
                    <span>Actualizar Especialidades</span>
                </button>
                <button class="action-btn" [routerLink]="['/admin/usuarios']">
                    <span>Gestionar Usuarios</span>
                </button>
                <button class="action-btn" [routerLink]="['/admin/paginas', 'resultados']">
                    <span>Portal Resultados</span>
                </button>
            </div>
        </div>

        <!-- System Status/Logs -->
        <div class="dashboard-card">
            <div class="card-header">
                <h3>Actividad Reciente</h3>
            </div>
            <div class="activity-list">
                <!-- Empty State for activity -->
                <div class="empty-activity">
                    <p>No hay actividad reciente para mostrar.</p>
                </div>
            </div>
        </div>
    </div>
</div>
