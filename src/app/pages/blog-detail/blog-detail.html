<div class="blog-detail-page" *ngIf="article">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a routerLink="/inicio" class="nav-logo">
                <img src="assets/images/Logo_ClinicaAleli_-Blanco.png" alt="Logo Clínica Alelí" class="nav-logo-img">
            </a>

            <ul class="nav-menu">
                <li><a routerLink="/inicio" routerLinkActive="active">INICIO</a></li>
                <li><a routerLink="/servicios" routerLinkActive="active">SERVICIOS</a></li>
                <li><a routerLink="/especialidades" routerLinkActive="active">ESPECIALIDADES</a></li>
                <li><a routerLink="/nosotros" routerLinkActive="active">NOSOTROS</a></li>
                <li><a routerLink="/instalaciones" routerLinkActive="active">INSTALACIONES</a></li>
                <li><a routerLink="/contacto" routerLinkActive="active">CONTACTO</a></li>
                <li><a routerLink="/blog" routerLinkActive="active">BLOG</a></li>
            </ul>

            <div class="nav-actions">
                <a routerLink="/auth" class="user-icon-btn" title="Iniciar Sesión">
                    <svg viewBox="0 0 24 24" width="35" height="35" fill="currentColor">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6.02-3.22.03-1.99 4.02-3.08 6.02-3.08 1.99 0 5.99 1.09 6.02 3.08-1.31 1.94-3.52 3.22-6.02 3.22z" />
                    </svg>
                </a>
                <button class="cta-button">AGENDAR<br>CITA</button>
            </div>
        </div>
    </nav>

    <main class="article-container">
        <!-- Back navigation link -->
        <div class="container top-nav">
            <a *ngIf="!isFirst && previousArticle" [routerLink]="['/blog', previousArticle.id]" class="back-link">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                ANTERIOR ARTÍCULO
            </a>
            <a *ngIf="isFirst" routerLink="/blog" class="back-link">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                VOLVER AL BLOG
            </a>
        </div>

        <header class="article-header">
            <div class="container">
                <h1 class="fadeInUp">{{ article.title }}</h1>
            </div>
        </header>

        <div class="container">
            <div class="article-main-image fadeInUp delay-1">
                <img [src]="article.image" [alt]="article.title">
            </div>

            <div class="article-content fadeInUp delay-2">
                <ng-container *ngFor="let section of article.content">
                    <p *ngIf="section.type === 'paragraph'" class="article-p">{{ section.text }}</p>
                    <h2 *ngIf="section.type === 'heading'" class="article-h2">{{ section.text }}</h2>
                    <ul *ngIf="section.type === 'list'" class="article-list">
                        <li *ngFor="let item of section.items">{{ item }}</li>
                    </ul>
                </ng-container>
            </div>

            <!-- Bottom Navigation -->
            <footer class="article-footer fadeInUp delay-3">
                <div class="navigation-btns">
                    <!-- Previous or Back to Blog -->
                    <a *ngIf="!isFirst && previousArticle" [routerLink]="['/blog', previousArticle.id]"
                        class="nav-btn-outline">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                        ANTERIOR ARTÍCULO
                    </a>
                    <a *ngIf="isFirst" routerLink="/blog" class="nav-btn-outline">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                        VOLVER AL BLOG
                    </a>

                    <!-- Next or Back to Blog -->
                    <a *ngIf="!isLast && nextArticle" [routerLink]="['/blog', nextArticle.id]" class="nav-btn-solid">
                        SIGUIENTE ARTÍCULO
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </a>
                    <a *ngIf="isLast" routerLink="/blog" class="nav-btn-solid">
                        VOLVER AL BLOG
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
            </footer>
        </div>
    </main>

    <!-- Footer -->
    <app-footer></app-footer>
</div>
