<div class="landing-page">
    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Especialidades Banner -->
    <section class="especialidades-header">
        <div class="container container-wide">
            <div class="banner-wrapper">
                <img src="assets/images/SERVICIOS/Especialidades_Banner.png" alt="Nuestras Especialidades Médicas"
                    class="banner-img">
            </div>
        </div>
    </section>

    <!-- Specialists Search Section -->
    <section class="specialists-search">
        <div class="container">
            <div class="search-header-intro">
                <h2 class="search-title">ESPECIALIDADES</h2>
                <p class="search-subtitle">Encuentra al especialista ideal para ti</p>
            </div>

            <div class="search-layout">
                <!-- Sidebar: Categorías -->
                <aside class="search-sidebar">
                    <div class="sidebar-group">
                        <div class="sidebar-header" (click)="resetFilters()">
                            <h3>CATEGORIAS</h3>
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                <path d="M7 10l5 5 5-5H7z" />
                            </svg>
                        </div>
                        <ul class="category-list">
                            <li *ngFor="let cat of categories">
                                <div class="dept-row" (click)="toggleCategory(cat)"
                                    [class.active-cat]="selectedCategory === cat.name">
                                    <span class="dept-name">{{cat.name}}</span>
                                    <span class="dept-count">{{cat.count}}</span>
                                    <span class="chevron" *ngIf="cat.subCategories"
                                        [class.rotated]="cat.isOpen">▼</span>
                                </div>
                                <ul class="sub-category-list" [class.show]="cat.isOpen" *ngIf="cat.subCategories">
                                    <li *ngFor="let sub of cat.subCategories"
                                        (click)="selectSubCategory($event, cat.name, sub.name)"
                                        [class.active-sub]="selectedSubCategory === sub.name">
                                        --{{sub.name}} <span class="sub-count">{{sub.count}}</span>
                                    </li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                </aside>

                <!-- Specialists Grid -->
                <div class="specialists-results">
                    <div class="specialists-grid-custom">
                        <div class="doctor-card" *ngFor="let doctor of filteredDoctors">
                            <div class="doctor-image">
                                <img [src]="doctor.image" [alt]="doctor.name">
                            </div>
                            <div class="doctor-info">
                                <h3>{{doctor.name}}</h3>
                                <div class="doctor-specialty">
                                    <span class="label">ESPECIALIDAD</span>
                                    <span class="value">{{doctor.specialty}}</span>
                                </div>
                                <button class="btn-perfil" [routerLink]="['/medico', doctor.id]">Ver Perfil</button>
                            </div>
                        </div>
                    </div>
                    <div class="no-results" *ngIf="filteredDoctors.length === 0">
                        <p>No se encontraron especialistas en esta categoría.</p>
                        <button class="btn-reset" (click)="resetFilters()">Ver todos</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <app-footer></app-footer>
</div>
