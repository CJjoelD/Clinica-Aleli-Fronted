<div class="landing-page">
    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Especialidades Banner -->
    <section class="especialidades-header" *ngIf="getSection('banner') as section" [hidden]="!section.enabled">
        <div class="container container-wide">
            <div class="banner-wrapper">
                <img [src]="section.content.imageUrl" [alt]="section.content.alt" class="banner-img">
            </div>
        </div>
    </section>

    <!-- Specialists Search Section -->
    <section class="specialists-search">
        <div class="container">
            <div class="search-header-intro" *ngIf="getSection('search_header') as section" [hidden]="!section.enabled">
                <h2 class="search-title">{{section.content.title}}</h2>
                <p class="search-subtitle">{{section.content.subtitle}}</p>
            </div>

            <div class="search-layout">
                <!-- Sidebar: Categorías -->
                <aside class="search-sidebar">
                    <div class="sidebar-group">
                        <div class="sidebar-header-main">
                            <h3>CATEGORÍAS</h3>
                            <button class="btn-clear-filters" *ngIf="isFilterActive()" (click)="resetFilters()"
                                [@fadeInOut]>
                                Limpiar filtros
                            </button>
                        </div>

                        <ul class="category-list">
                            <!-- All Categories Option -->
                            <li class="all-cats-item" (click)="resetFilters()"
                                [class.active-all]="selectedCategory === 'all'">
                                <div class="dept-row">
                                    <div class="dept-icon-box">
                                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <path d="M4 6h16M4 12h16M4 18h16"></path>
                                        </svg>
                                    </div>
                                    <span class="dept-name">Todas las Especialidades</span>
                                    <span class="dept-count">{{doctors.length}}</span>
                                </div>
                            </li>

                            <div class="sidebar-divider"></div>

                            <!-- Dynamic Categories -->
                            <li *ngFor="let cat of categories" class="cat-item-wrapper">
                                <div class="dept-row" (click)="selectCategory(cat.name)"
                                    [class.active-cat]="selectedCategory === cat.name">
                                    <span class="dept-name">{{cat.name}}</span>
                                    <span class="dept-count">{{cat.count}}</span>
                                    <div class="toggle-icon" *ngIf="cat.subCategories"
                                        (click)="toggleCategory($event, cat)">
                                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
                                            stroke="currentColor" stroke-width="2.5" [class.rotated]="cat.isOpen">
                                            <path d="M6 9l6 6 6-6"></path>
                                        </svg>
                                    </div>
                                </div>
                                <ul class="sub-category-list" [class.show]="cat.isOpen" *ngIf="cat.subCategories">
                                    <li *ngFor="let sub of cat.subCategories"
                                        (click)="selectSubCategory($event, cat.name, sub.name)"
                                        [class.active-sub]="selectedSubCategory === sub.name">
                                        <span class="sub-dot"></span>
                                        <span class="sub-name">{{sub.name}}</span>
                                        <span class="sub-count">{{sub.count}}</span>
                                    </li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                </aside>

                <!-- Specialists Grid -->
                <div class="specialists-results">
                    <div class="specialists-grid-custom">
                        <div class="doctor-card" *ngFor="let doctor of filteredDoctors">
                            <div class="doctor-image">
                                <img [src]="doctor.image" [alt]="doctor.name">
                            </div>
                            <div class="doctor-info">
                                <h3>{{doctor.name}}</h3>
                                <div class="doctor-specialty">
                                    <span class="label">ESPECIALIDAD</span>
                                    <span class="value">{{doctor.specialty}}</span>
                                </div>
                                <button class="btn-perfil" [routerLink]="['/medico', doctor.id]">Ver Perfil</button>
                            </div>
                        </div>
                    </div>
                    <div class="no-results" *ngIf="filteredDoctors.length === 0">
                        <p>No se encontraron especialistas en esta categoría.</p>
                        <button class="btn-reset" (click)="resetFilters()">Ver todos</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <app-footer></app-footer>
</div>
