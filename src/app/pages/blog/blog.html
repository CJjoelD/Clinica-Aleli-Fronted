<div class="blog-page">
    <app-navbar></app-navbar>

    <!-- Header Dinámico -->
    <header class="blog-header" *ngIf="getSection('blog_header') as section">
        <div class="header-content" *ngIf="section.enabled">
            <span class="blog-label">{{section.content.label}}</span>
            <h1>{{section.content.title}}</h1>
        </div>
    </header>

    <section class="articles-list" *ngIf="getSection('articulos') as section">
        <div class="container" *ngIf="section.enabled">
            <!-- Grid de artículos más moderno -->
            <div class="blog-grid">
                <article class="blog-card" *ngFor="let article of section.content.items; let i = index">
                    <div class="card-image-box">
                        <img [src]="article.imageUrl" [alt]="article.title" class="card-img">
                        <div class="card-overlay">
                            <span class="category-tag">BIENESTAR</span>
                        </div>
                    </div>

                    <div class="card-body">
                        <div class="card-meta">
                            <span class="date">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                2026-03-03
                            </span>
                        </div>
                        <h2 class="card-title">{{article.title}}</h2>
                        <p class="card-excerpt">{{article.excerpt}}</p>
                        <div class="card-footer">
                            <a [routerLink]="['/blog', article.link]" class="btn-read-more">
                                LEER MÁS
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="3">
                                    <path d="M5 12h14M12 5l7 7-7 7"></path>
                                </svg>
                            </a>
                        </div>
                    </div>
                </article>
            </div>

            <!-- Empty State si no hay artículos -->
            <div class="empty-blog" *ngIf="!section.content.items || section.content.items.length === 0">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="#6a1b9a" stroke-width="1.5">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                </div>
                <h3>No hay artículos aún</h3>
                <p>Estamos trabajando en contenido nuevo para ti.</p>
            </div>
        </div>
    </section>

    <app-footer></app-footer>
</div>
