<div class="instalaciones-page">
    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Secciones dinámicas -->
    <ng-container *ngIf="pageConfig() as page">

        <!-- Sección de cabecera -->
        <header class="page-header" *ngIf="getSection('hero') as section">
            <div class="container" *ngIf="section.enabled">
                <h1 class="page-title">{{section.content.title}}</h1>
                <p class="page-subtitle">{{section.content.description}}</p>
            </div>
        </header>

        <!-- Sección de galería -->
        <section class="gallery-section" *ngIf="getSection('galeria_instalaciones') as section">
            <div class="container" *ngIf="section.enabled">
                <div class="gallery-grid">
                    <div class="gallery-item" *ngFor="let item of section.content.items; let i = index"
                        [class.large]="i === 0">
                        <img [src]="item.imageUrl" [alt]="item.title">
                    </div>
                </div>
            </div>
        </section>

        <!-- Detalles de instalaciones -->
        <section class="details-section" *ngIf="getSection('detalles_instalaciones') as section">
            <div class="container" *ngIf="section.enabled">
                <div class="detail-row" *ngFor="let item of section.content.items">
                    <div class="detail-image">
                        <img [src]="item.imageUrl" [alt]="item.title">
                    </div>
                    <div class="detail-content">
                        <h2>{{item.title}}</h2>
                        <ul class="points-list">
                            <li *ngFor="let point of item.points">{{point}}</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>

        <!-- Cuadrícula de resumen -->
        <section class="summary-section" *ngIf="getSection('resumen_caracteristicas') as section">
            <div class="container" *ngIf="section.enabled">
                <h2 class="section-title">{{section.content.title}}</h2>
                <div class="summary-grid">
                    <div class="summary-card" *ngFor="let item of section.content.items">
                        <div class="icon-circle">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                                stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                        <h3>{{item.title}}</h3>
                        <p>{{item.description}}</p>
                    </div>
                </div>
            </div>
        </section>
    </ng-container>

    <!-- Footer -->
    <app-footer></app-footer>
</div>
