<div class="landing-page">
    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Secciones dinámicas -->
    <ng-container *ngIf="pageConfig() as page">

        <!-- Sección Hero de servicios -->
        <section class="services-hero" *ngIf="getSection('hero') as section">
            <div class="container" *ngIf="section.enabled">
                <div class="section-header">
                    <div class="header-icon-wrapper">
                        <svg viewBox="0 0 24 24" class="header-icon" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                            <path d="M12 11h.01M12 15h.01M8 11h.01M8 15h.01M16 11h.01M16 15h.01"></path>
                        </svg>
                    </div>
                    <h1 class="main-title">{{section.content.title}}</h1>
                    <p class="main-description">
                        {{section.content.description}}
                    </p>
                    <div class="header-line"></div>
                </div>
            </div>
        </section>

        <!-- Cuadrícula de especialidades -->
        <section class="specialties-section" *ngIf="getSection('servicios') as section">
            <div class="container" *ngIf="section.enabled">
                <div class="specialties-intro">
                    <h2 class="sub-title">{{section.content.title}}</h2>
                    <p class="sub-description">{{section.content.subtitle}}</p>
                </div>

                <div class="services-grid">
                    <div class="service-card" *ngFor="let item of section.content.items; let i = index"
                        [class.highlight-card]="i === 5">
                        <div class="service-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2" *ngIf="i === 5"></path>
                                <path d="M12 21a9 9 0 100-18 9 9 0 000 18z M12 8v8M8 12h8" *ngIf="i !== 5"></path>
                            </svg>
                        </div>
                        <div class="card-body">
                            <h3>{{item.title}}</h3>
                            <p>{{item.description}}</p>
                            <a [routerLink]="['/servicio', item.id]" class="view-more-link">VER MÁS <span
                                    class="arrow">→</span></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Sección de instalaciones -->
        <section class="facilities-section" *ngIf="getSection('nosotros_hero') as section">
            <div class="container" *ngIf="section.enabled">
                <h2 class="section-title">{{section.content.title}}</h2>
                <p class="sub-description text-center mb-5">{{section.content.description}}</p>
                <div class="facilities-grid">
                    <div class="facility-item" *ngFor="let item of (section.content.items || [
                        {title: 'Instalaciones Modernas', description: 'Instalaciones modernas y tecnológicamente avanzadas.'},
                        {title: 'Especialidades', description: 'Amplia gama de especialidades y servicios en un entorno cómodo.'},
                        {title: 'Equipamiento', description: 'Quirófanos equipados con tecnologías de punta.'}
                    ])">
                        <div class="facility-header">
                            <span class="facility-icon-circle">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                                    stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </span>
                            <h3>{{item.title}}</h3>
                        </div>
                        <p>{{item.description}}</p>
                    </div>
                </div>
            </div>
        </section>
    </ng-container>

    <!-- Footer -->
    <app-footer></app-footer>
</div>
